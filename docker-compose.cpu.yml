services:
  infergate:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./config:/app/config:ro
      - ./models:/app/models
      - ./cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
