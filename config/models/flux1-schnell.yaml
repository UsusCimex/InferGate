id: flux1-schnell
display_name: "FLUX.1 Schnell"
category: image
provider_class: DiffusersImageProvider
enabled: false

model:
  hub_id: "black-forest-labs/FLUX.1-schnell"
  revision: "main"
  torch_dtype: float16
  variant: fp16
  vram_mb: 8000
  default_params:
    num_inference_steps: 4
    guidance_scale: 0.0
    width: 1024
    height: 1024

cache:
  enabled: true
  strategy: seed_only
  ttl_hours: null
  max_size_mb: 2048

queue:
  priority: low
  timeout_seconds: 120
  max_concurrent: 1

metadata:
  license: Apache-2.0
  description: "Fastest FLUX model, 4-step generation"
  tags: ["fast", "flux", "apache2"]
