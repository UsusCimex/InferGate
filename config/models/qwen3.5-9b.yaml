id: qwen3.5-9b
display_name: "Qwen 3.5 9B"
category: text
provider_class: VllmTextProvider
enabled: false

model:
  hub_id: "Qwen/Qwen3.5-9B"
  vram_mb: 8000
  torch_dtype: float16
  default_params:
    max_tokens: 2048
    temperature: 0.7
    top_p: 0.9
  context_length: 32768

cache:
  enabled: false
  strategy: never

queue:
  priority: medium
  timeout_seconds: 60
  max_concurrent: 1

metadata:
  license: Apache-2.0
  description: "Best small model, 201 languages, 256K context"
  tags: ["multilingual", "large-context"]
