services:
  infergate:
    build: .
    env_file: .env
    ports:
      - "${PORT:-8000}:8000"
    shm_size: "1g"
    volumes:
      - ./config:/app/config:ro
      - ./models:/app/models
      - ./cache:/app/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
